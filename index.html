  <style>
    :root{font-family:Inter,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:#27313a;background:#e9e7e1;letter-spacing:0}*{box-sizing:border-box}body{min-height:100vh;margin:0;background:linear-gradient(180deg,#29333e 0 37%,#e9e7e1 37%);color:#29323a}.shell{width:min(1080px,calc(100% - 32px));margin:0 auto;padding:24px 0 40px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;color:#f3f0e8}.brand{display:flex;align-items:center;gap:12px}.brand img{width:54px;height:54px;border:1px solid #52606d;border-radius:7px;background:#18212a;object-fit:cover}.brand b{display:block;color:#e1b55f;font-size:21px}.brand span{display:block;margin-top:5px;color:#c4ccd2;font-size:12px}.status{padding:8px 11px;border:1px solid #53616d;border-radius:6px;color:#c9d0d5;font-size:11px}.intro{max-width:720px;padding:62px 0 34px;color:#f5f2ea}.intro p{margin:0 0 8px;color:#e0b45d;font-size:12px;font-weight:800}.intro h1{margin:0;font-size:clamp(27px,5vw,45px);line-height:1.18}.intro small{display:block;margin-top:13px;color:#bdc6cc;font-size:14px;line-height:1.7}.modes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.mode{position:relative;display:grid;grid-template-rows:230px auto;overflow:hidden;border:1px solid #cbc8c0;border-radius:8px;background:#f8f6f0;color:inherit;text-decoration:none;box-shadow:0 14px 35px rgba(28,35,42,.14);transition:transform 220ms ease,box-shadow 220ms ease,border-color 220ms ease}.mode:hover,.mode:focus-visible{transform:translateY(-3px);border-color:#ba8b3d;box-shadow:0 18px 42px rgba(28,35,42,.2);outline:0}.preview{position:relative;overflow:hidden;background-color:#eee8dc;background-image:linear-gradient(rgba(115,91,57,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(115,91,57,.11) 1px,transparent 1px);background-size:24px 24px}.preview::before,.preview::after{position:absolute;content:"";border:2px solid #56616a;background:rgba(250,248,242,.82)}.kitchen .preview::before{left:12%;right:12%;bottom:22%;height:31%}.kitchen .preview::after{left:17%;right:17%;bottom:53%;height:21%;background:rgba(232,227,217,.9)}.cabinet .preview::before{left:24%;width:22%;bottom:13%;height:70%}.cabinet .preview::after{left:49%;width:27%;bottom:13%;height:70%}.preview b{position:absolute;right:18px;top:16px;padding:6px 9px;border-radius:4px;background:#28323c;color:#e0b45d;font-size:10px}.mode-body{display:grid;grid-template-columns:1fr auto;align-items:end;gap:20px;padding:20px}.mode-body span{color:#9b702e;font-size:10px;font-weight:900}.mode-body h2{margin:5px 0 7px;font-size:22px}.mode-body p{margin:0;color:#69737a;font-size:12px;line-height:1.65}.arrow{display:grid;place-items:center;width:42px;height:42px;border-radius:50%;background:#2c3741;color:#e4b65e;font-size:22px}.note{margin:18px 0 0;color:#737c82;font-size:11px;text-align:center}@media(max-width:700px){body{background:linear-gradient(180deg,#29333e 0 31%,#e9e7e1 31%)}.shell{width:min(100% - 20px,520px);padding-top:12px}.brand img{width:44px;height:44px}.brand b{font-size:17px}.status{display:none}.intro{padding:36px 4px 23px}.intro h1{font-size:28px}.intro small{font-size:12px}.modes{grid-template-columns:1fr;gap:12px}.mode{grid-template-columns:116px 1fr;grid-template-rows:auto;min-height:148px}.preview{min-height:148px}.preview b{top:9px;right:8px}.mode-body{padding:15px;gap:8px}.mode-body h2{font-size:18px}.mode-body p{font-size:10px}.arrow{width:34px;height:34px;font-size:18px}}
  </style>

<body>
  <main class="shell">
    <header class="topbar"><div class="brand"><img src="./icons/modudraft-logo-refined.png" alt="MODUDRAFT 圖示"><div><b>MODUDRAFT</b><span>室內設計草圖工作台</span></div></div><div class="status">手機 · 平板 · 電腦</div></header>
    <section class="intro"><p>選擇工作模式</p><h1>今天要配置哪一種空間？</h1><small>兩套工具共用同一個入口，各自保存設計資料；系統櫃仍可獨立測試與修改。</small></section>
    <section class="modes" aria-label="工作模式">
      <a class="mode kitchen" href="./modudraft_fixed.html"><div class="preview"><b>正式工作版</b></div><div class="mode-body"><div><span>廚具配置</span><h2>廚具設計</h2><p>建立牆面、下櫃、吊櫃、設備、工程圖與 3D 草圖。</p></div><div class="arrow">›</div></div></a>
      <a class="mode cabinet" href="./system-cabinet-prototype/"><div class="preview"><b>獨立測試版</b></div><div class="mode-body"><div><span>收納配置</span><h2>系統櫃設計</h2><p>配置多面牆、高櫃、補板、層板、門片與內部配件。</p></div><div class="arrow">›</div></div></a>
    </section>
    <p class="note">設計內容只儲存在目前裝置的瀏覽器中。</p>
  </main>
